# code-fix-001 隐藏评审规则（Agent 不可见）
schema_version: 1
judge_version: "1.2.0"

checks:
  - id: REAL_CHANGES
    type: changed_files_verified
    dimension: format
    points: 15
    blocking: true
    severity: high
    feedback_fail: 申报的 changed_files 与工作区实际变更不符（申报了修改但文件内容未变化）

  - id: SPEC_BEHAVIOR
    type: command
    dimension: correctness
    points: 50
    blocking: true
    severity: critical
    cmd: "cp {hidden}/CalculatorSpec.java src/ && cd src && javac PriceCalculator.java CalculatorSpec.java && java CalculatorSpec {nonce}"
    timeout_seconds: 120
    expect_exit_code: 0
    output_regex: "ALL_CHECKS_PASSED:{nonce}"
    feedback_fail: 修复后的代码未满足全部期望行为（编译失败、缺陷行为未修复，或破坏了既有方法的正确行为）

  - id: TESTS_DECLARED
    type: jsonpath_exists
    dimension: tests
    points: 10
    severity: low
    path: "$.tests_run[0]"
    feedback_fail: 未申报任何自测记录（tests_run 为空）

  - id: TESTS_PASSED_DECLARED
    type: jsonpath_matches
    dimension: tests
    points: 10
    severity: low
    path: "$.tests_run[0].result"
    regex: "^passed$"
    feedback_fail: 申报的首条自测结果不是 passed

  - id: ROOT_CAUSE_EXPLAINED
    type: list_coverage
    dimension: explanation
    points: 15
    severity: low
    path: "$.summary"
    min_matches: 1
    expected_any_of:
      - ["越界", "下标", "index", "边界", "<="]
      - ["空", "null", "empty"]
    feedback_fail: 提交说明未解释缺陷根因（越界/空值处理）

